<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lector Markdown</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a;
    --paper: #f5f0e8;
    --paper-dark: #ede8dc;
    --accent: #c0392b;
    --accent-muted: #e8d5d3;
    --rule: #c8bfad;
    --sidebar-w: 320px;
    --font-size: 18px;
    --hl-yellow: #fff176cc;
    --hl-green:  #b9f6cacc;
    --hl-blue:   #b3e5fccc;
    --hl-pink:   #f8bbd0cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: var(--font-size);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--accent);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 28px; height: 28px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    font-weight: 500;
    color: white;
    flex-shrink: 0;
  }
  .header-actions { display: flex; gap: 12px; align-items: center; }

  .btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    border: 1px solid rgba(245,240,232,0.3);
    background: transparent;
    color: var(--paper);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn:hover { background: var(--accent); border-color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #a93226; }

  /* LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }

  /* SIDEBAR */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 3px solid var(--accent);
    transition: width 0.3s ease;
    overflow: hidden;
  }
  .sidebar.collapsed { width: 0; border-right: none; }
  .sidebar-header {
    padding: 1.2rem 1.5rem 1rem;
    border-bottom: 1px solid rgba(200,191,173,0.2);
  }
  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--rule);
    margin-bottom: 0.8rem;
  }
  .drop-zone {
    border: 1.5px dashed rgba(200,191,173,0.4);
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--rule);
    letter-spacing: 0.05em;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(192,57,43,0.05);
  }
  .drop-icon { font-size: 1.4rem; margin-bottom: 0.4rem; display: block; }
  .file-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
  .file-list::-webkit-scrollbar { width: 4px; }
  .file-list::-webkit-scrollbar-thumb { background: rgba(200,191,173,0.3); }
  .file-item {
    padding: 0.7rem 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: rgba(245,240,232,0.7);
    letter-spacing: 0.02em;
  }
  .file-item:hover { background: rgba(245,240,232,0.05); color: var(--paper); border-left-color: rgba(200,191,173,0.4); }
  .file-item.active { background: rgba(192,57,43,0.12); color: var(--paper); border-left-color: var(--accent); }
  .file-icon { color: var(--accent); flex-shrink: 0; font-size: 0.9rem; }
  .file-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-remove {
    opacity: 0; background: none; border: none; color: var(--rule);
    cursor: pointer; font-size: 0.85rem; padding: 2px 4px; transition: all 0.15s;
  }
  .file-item:hover .file-remove { opacity: 1; }
  .file-remove:hover { color: var(--accent); }
  .sidebar-footer {
    padding: 0.8rem 1.5rem;
    border-top: 1px solid rgba(200,191,173,0.2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: rgba(200,191,173,0.5);
    letter-spacing: 0.05em;
  }

  /* NOTES PANEL in sidebar */
  .notes-panel {
    border-top: 1px solid rgba(200,191,173,0.2);
    padding: 1rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 260px;
  }
  .notes-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rule);
  }
  #notesTextarea {
    background: rgba(245,240,232,0.07);
    border: 1px solid rgba(200,191,173,0.25);
    color: var(--paper);
    font-family: 'Crimson Pro', serif;
    font-size: 0.88rem;
    padding: 0.6rem;
    resize: vertical;
    min-height: 90px;
    line-height: 1.6;
    outline: none;
    transition: border-color 0.2s;
  }
  #notesTextarea:focus { border-color: var(--accent); }
  #notesTextarea::placeholder { color: rgba(200,191,173,0.4); font-style: italic; }
  .notes-hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    color: rgba(200,191,173,0.4);
    letter-spacing: 0.04em;
  }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; position: relative; background: var(--paper); }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: var(--paper-dark); }
  .main::-webkit-scrollbar-thumb { background: var(--rule); }

  /* TOOLBAR */
  .toolbar {
    position: sticky;
    top: 0;
    background: var(--paper-dark);
    border-bottom: 1px solid var(--rule);
    padding: 0.4rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 0.6rem; }
  .toolbar-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

  .toggle-sidebar {
    background: none;
    border: 1px solid var(--rule);
    cursor: pointer;
    padding: 4px 8px;
    color: var(--ink);
    font-size: 1rem;
    transition: all 0.2s;
    display: flex; align-items: center;
  }
  .toggle-sidebar:hover { background: var(--ink); color: var(--paper); }

  .file-title-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: rgba(26,26,26,0.5);
    letter-spacing: 0.05em;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Font size control */
  .font-size-control {
    display: flex;
    align-items: center;
    gap: 5px;
    border: 1px solid var(--rule);
    padding: 3px 8px;
  }
  .font-size-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(26,26,26,0.4);
    white-space: nowrap;
  }
  .font-size-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--ink);
    min-width: 26px;
    text-align: right;
  }
  input[type="range"].font-slider {
    -webkit-appearance: none; appearance: none;
    width: 80px; height: 3px;
    background: var(--rule); outline: none; cursor: pointer;
  }
  input[type="range"].font-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 12px; height: 12px; background: var(--accent); cursor: pointer;
  }
  input[type="range"].font-slider::-moz-range-thumb {
    width: 12px; height: 12px; background: var(--accent); border: none; cursor: pointer;
  }

  /* Highlight color picker */
  .hl-picker {
    display: flex;
    align-items: center;
    gap: 4px;
    border: 1px solid var(--rule);
    padding: 3px 8px;
  }
  .hl-picker-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(26,26,26,0.4);
    margin-right: 2px;
  }
  .hl-swatch {
    width: 16px; height: 16px;
    border-radius: 2px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .hl-swatch.active { border-color: var(--ink); transform: scale(1.2); }
  .hl-swatch:hover { transform: scale(1.15); }

  .view-toggle { display: flex; border: 1px solid var(--rule); overflow: hidden; }
  .view-btn {
    background: none; border: none; padding: 5px 10px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: rgba(26,26,26,0.5); transition: all 0.15s;
  }
  .view-btn.active { background: var(--ink); color: var(--paper); }
  .view-btn:hover:not(.active) { background: var(--paper-dark); color: var(--ink); }

  /* AI summary button */
  .btn-summary {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    border: 1px solid var(--rule);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .btn-summary:hover { background: var(--ink); color: var(--paper); }
  .btn-summary.loading { opacity: 0.6; cursor: default; }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; min-height: 60vh; gap: 1.5rem; padding: 2rem; text-align: center;
  }
  .empty-state-mark { font-family: 'Playfair Display', serif; font-size: 5rem; color: var(--rule); line-height: 1; font-style: italic; }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--ink); font-weight: 400; }
  .empty-state p { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: rgba(26,26,26,0.4); letter-spacing: 0.05em; max-width: 340px; line-height: 1.7; }

  /* CONTENT AREA */
  .content-area { max-width: 780px; margin: 0 auto; padding: 3rem 2.5rem 5rem; }

  /* META BAR */
  .meta-bar {
    padding: 0.8rem 2.5rem;
    border-bottom: 1px solid var(--rule);
    display: flex; gap: 2rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.08em;
    color: rgba(26,26,26,0.45); text-transform: uppercase;
    max-width: 780px; margin: 0 auto;
  }

  /* MARKDOWN RENDERED */
  .md-rendered { line-height: 1.75; color: var(--ink); }

  .md-rendered h1 {
    font-family: 'Playfair Display', serif; font-size: 2.6rem; font-weight: 700;
    line-height: 1.15; margin: 0 0 0.3rem; color: var(--ink);
  }
  .md-rendered h2 {
    font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 400;
    font-style: italic; margin: 2.5rem 0 1rem; padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule); color: var(--ink);
  }
  .md-rendered h3 {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; margin: 2rem 0 0.8rem; color: var(--accent);
  }
  .md-rendered h4, .md-rendered h5, .md-rendered h6 {
    font-family: 'Playfair Display', serif; font-size: 1.1rem; margin: 1.5rem 0 0.6rem;
  }
  .md-rendered p { margin: 0 0 1.2rem; }
  .md-rendered p:first-of-type::first-letter {
    font-family: 'Playfair Display', serif; font-size: 3.5rem; font-weight: 700;
    line-height: 0.8; float: left; margin: 0.05em 0.1em 0 0; color: var(--accent);
  }
  .md-rendered hr {
    border: none; border-top: 1px solid var(--rule); margin: 2.5rem 0; position: relative;
  }
  .md-rendered hr::after {
    content: '◆'; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%); background: var(--paper);
    padding: 0 0.8rem; color: var(--rule); font-size: 0.6rem;
  }
  .md-rendered strong { font-weight: 600; color: var(--ink); }
  .md-rendered em { font-style: italic; }
  .md-rendered a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-muted); transition: border-color 0.2s; }
  .md-rendered a:hover { border-color: var(--accent); }
  .md-rendered code {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.82em;
    background: var(--paper-dark); border: 1px solid var(--rule); padding: 1px 5px; color: var(--accent);
  }
  .md-rendered pre {
    background: var(--ink); border-left: 3px solid var(--accent);
    padding: 1.3rem 1.5rem; margin: 1.5rem 0; overflow-x: auto;
  }
  .md-rendered pre code { background: transparent; border: none; color: var(--paper); font-size: 0.82rem; padding: 0; }
  .md-rendered blockquote {
    border-left: 3px solid var(--accent); padding: 0.8rem 0 0.8rem 1.5rem;
    margin: 1.5rem 0; background: var(--paper-dark); font-style: italic; font-size: 1.05em;
  }
  .md-rendered ul, .md-rendered ol { margin: 0.8rem 0 1.2rem 1.5rem; }
  .md-rendered li { margin-bottom: 0.35rem; }
  .md-rendered ul li::marker { color: var(--accent); }
  .md-rendered table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9em; }
  .md-rendered th {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7em; letter-spacing: 0.1em;
    text-transform: uppercase; background: var(--ink); color: var(--paper);
    padding: 0.6rem 0.8rem; text-align: left; border: 1px solid var(--ink);
  }
  .md-rendered td { padding: 0.55rem 0.8rem; border: 1px solid var(--rule); }
  .md-rendered tr:nth-child(even) td { background: var(--paper-dark); }
  .md-rendered img { max-width: 100%; height: auto; display: block; margin: 1.5rem auto; border: 1px solid var(--rule); }

  /* HIGHLIGHTS */
  mark.hl { border-radius: 2px; padding: 0 2px; cursor: pointer; }
  mark.hl:hover::after { content: ' ✕'; font-size: 0.7em; opacity: 0.6; }
  mark.hl-yellow { background: var(--hl-yellow); }
  mark.hl-green  { background: var(--hl-green); }
  mark.hl-blue   { background: var(--hl-blue); }
  mark.hl-pink   { background: var(--hl-pink); }

  /* RAW VIEW */
  .md-raw {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; line-height: 1.8;
    color: var(--ink); white-space: pre-wrap; word-break: break-word;
    background: var(--paper-dark); padding: 2rem; border: 1px solid var(--rule); min-height: 200px;
  }

  /* SPLIT VIEW */
  .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: 100%; }
  .split-pane { overflow-y: auto; height: calc(100vh - 112px); }
  .split-pane:first-child { border-right: 1px solid var(--rule); }
  .split-pane .md-raw { margin: 0; border: none; height: 100%; min-height: 100%; background: #1e1e1e; color: #d4d0c8; border-radius: 0; }
  .split-pane .content-area { padding: 2rem 2rem 4rem; }

  /* SUMMARY PANEL */
  .summary-panel {
    background: var(--paper-dark);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    margin: 1.5rem 0;
    padding: 1.2rem 1.5rem;
    position: relative;
  }
  .summary-panel-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.8rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .summary-close {
    background: none; border: none; cursor: pointer;
    color: rgba(26,26,26,0.4); font-size: 0.9rem;
    transition: color 0.15s;
  }
  .summary-close:hover { color: var(--accent); }
  .summary-content {
    font-family: 'Crimson Pro', serif;
    font-size: 1rem;
    line-height: 1.7;
    color: var(--ink);
  }
  .summary-content ul { margin: 0.6rem 0 0 1.2rem; }
  .summary-content li { margin-bottom: 0.3rem; }
  .summary-loading {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    color: rgba(26,26,26,0.5); letter-spacing: 0.05em;
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ANIMATIONS */
  .content-area { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  #fileInput { display: none; }

  @media print {
    header, .sidebar, .toolbar { display: none; }
    .main { overflow: visible; }
    .content-area { max-width: 100%; padding: 0; }
  }
  @media (max-width: 700px) {
    .sidebar { position: fixed; height: 100vh; z-index: 200; top: 56px; left: 0; }
    .content-area { padding: 1.5rem 1rem 4rem; }
    .split-view { grid-template-columns: 1fr; }
    .split-pane:first-child { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">MD</div>
    Lector Markdown
  </div>
  <div class="header-actions">
    <button class="btn" id="pasteBtn">⌘ Pegar</button>
    <button class="btn btn-primary" id="openBtn">Abrir archivo</button>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Archivos abiertos</div>
      <div class="drop-zone" id="dropZone">
        <span class="drop-icon">📂</span>
        Arrastrar archivos .md aquí
      </div>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="sidebar-footer" id="sidebarFooter">Sin archivos</div>

    <!-- NOTES PANEL -->
    <div class="notes-panel" id="notesPanel" style="display:none;">
      <div class="notes-panel-title">📝 Mis notas</div>
      <textarea id="notesTextarea" placeholder="Escribe aquí tus notas, ideas o lo que quieras recordar de este documento..."></textarea>
      <div class="notes-hint">Las notas se guardan automáticamente por archivo.</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-state-mark">#</div>
      <h2>Ningún archivo abierto</h2>
      <p>Abre un archivo .md, arrastra uno al panel lateral, o pega tu texto Markdown directamente.</p>
      <button class="btn btn-primary" id="emptyOpenBtn">Abrir archivo</button>
    </div>
  </main>
</div>

<!-- PASTE MODAL -->
<div id="pasteModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:300;align-items:center;justify-content:center;">
  <div style="background:var(--paper);border:2px solid var(--ink);padding:2rem;width:90%;max-width:620px;max-height:80vh;display:flex;flex-direction:column;gap:1rem;">
    <div style="font-family:'Playfair Display',serif;font-size:1.3rem;">Pegar Markdown</div>
    <textarea id="pasteArea" style="flex:1;min-height:260px;font-family:'IBM Plex Mono',monospace;font-size:0.8rem;padding:1rem;border:1px solid var(--rule);background:var(--paper-dark);resize:vertical;color:var(--ink);" placeholder="Pega tu Markdown aquí..."></textarea>
    <div style="display:flex;gap:0.8rem;justify-content:flex-end;">
      <button class="btn" id="pasteCancelBtn" style="color:var(--ink);border-color:var(--rule);">Cancelar</button>
      <button class="btn btn-primary" id="pasteConfirmBtn">Cargar</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// STATE
// ================================================================
let files = [];
let activeId = null;
let viewMode = 'rendered';
let fontSize = 18;
let hlColor = 'yellow';
let notes = {};        // { fileId: string }
let summaries = {};    // { fileId: string | null }
let highlights = {};   // { fileId: [{id, color, text}] }
let summaryVisible = {};

const HL_COLORS = ['yellow','green','blue','pink'];

// ================================================================
// MARKDOWN PARSER
// ================================================================
function parseMarkdown(md) {
  let html = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\w]*\n?([\s\S]*?)```/g, (_,c) => `<pre><code>${c.trim()}</code></pre>`)
    .replace(/^###### (.+)$/gm,'<h6>$1</h6>')
    .replace(/^##### (.+)$/gm,'<h5>$1</h5>')
    .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^(---|\*\*\*|___)$/gm,'<hr>')
    .replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/___(.+?)___/g,'<strong><em>$1</em></strong>')
    .replace(/__(.+?)__/g,'<strong>$1</strong>')
    .replace(/_(.+?)_/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img alt="$1" src="$2">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/((?:^\|.+\|\n)+)/gm, block => {
      const rows = block.trim().split('\n');
      let out = '<table>';
      rows.forEach((row,i) => {
        if (/^\|[-:| ]+\|$/.test(row)) return;
        const cells = row.split('|').filter((_,idx,arr)=>idx>0&&idx<arr.length-1);
        const tag = i===0?'th':'td';
        out += '<tr>'+cells.map(c=>`<${tag}>${c.trim()}</${tag}>`).join('')+'</tr>';
      });
      return out+'</table>';
    })
    .replace(/((?:^[ \t]*[-*+] .+\n?)+)/gm, block => {
      const items = block.trim().split('\n').map(l=>l.replace(/^[ \t]*[-*+] /,'').trim());
      return '<ul>'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
    })
    .replace(/((?:^\d+\. .+\n?)+)/gm, block => {
      const items = block.trim().split('\n').map(l=>l.replace(/^\d+\. /,'').trim());
      return '<ol>'+items.map(i=>`<li>${i}</li>`).join('')+'</ol>';
    })
    .split('\n\n')
    .map(para => {
      para = para.trim();
      if (!para) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote|table|hr)/.test(para)) return para;
      return '<p>'+para.replace(/\n/g,'<br>')+'</p>';
    })
    .join('\n');
  return html;
}

// ================================================================
// UTILS
// ================================================================
function wordCount(t){ return t.trim().split(/\s+/).filter(Boolean).length; }
function readTime(w){ return Math.ceil(w/220)+' min'; }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyFontSize() {
  document.querySelectorAll('.md-rendered, .md-raw').forEach(el => {
    el.style.fontSize = fontSize + 'px';
  });
}

// ================================================================
// HIGHLIGHTS  (applied after render via DOM manipulation)
// ================================================================
function applyHighlightsToDOM() {
  if (!activeId) return;
  const hls = highlights[activeId] || [];
  const container = document.querySelector('.md-rendered');
  if (!container) return;

  // Re-apply saved highlights by matching text
  hls.forEach(h => {
    applyHighlightToText(container, h.text, h.color, h.id);
  });
}

function applyHighlightToText(container, searchText, color, id) {
  // Walk text nodes and wrap matches
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  let node;
  const toWrap = [];
  while ((node = walker.nextNode())) {
    const idx = node.textContent.indexOf(searchText);
    if (idx !== -1) {
      toWrap.push({node, idx});
      break; // only first occurrence per saved highlight
    }
  }
  toWrap.forEach(({node, idx}) => {
    const before = node.textContent.slice(0, idx);
    const match  = node.textContent.slice(idx, idx + searchText.length);
    const after  = node.textContent.slice(idx + searchText.length);
    const mark = document.createElement('mark');
    mark.className = `hl hl-${color}`;
    mark.dataset.hlId = id;
    mark.textContent = match;
    mark.title = 'Clic para eliminar subrayado';
    mark.addEventListener('click', () => removeHighlight(id));
    const frag = document.createDocumentFragment();
    if (before) frag.appendChild(document.createTextNode(before));
    frag.appendChild(mark);
    if (after) frag.appendChild(document.createTextNode(after));
    node.parentNode.replaceChild(frag, node);
  });
}

function removeHighlight(id) {
  if (!activeId) return;
  highlights[activeId] = (highlights[activeId] || []).filter(h => h.id !== id);
  // Remove from DOM
  const mark = document.querySelector(`mark[data-hl-id="${id}"]`);
  if (mark) {
    const text = document.createTextNode(mark.textContent);
    mark.parentNode.replaceChild(text, mark);
  }
}

function handleTextSelection() {
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0) return;
  const text = sel.toString().trim();
  if (!text || text.length < 2) return;

  // Make sure selection is inside .md-rendered
  const container = document.querySelector('.md-rendered');
  if (!container) return;
  const range = sel.getRangeAt(0);
  if (!container.contains(range.commonAncestorContainer)) return;

  const id = Date.now() + Math.random();
  if (!highlights[activeId]) highlights[activeId] = [];
  highlights[activeId].push({ id, color: hlColor, text });

  // Apply immediately
  applyHighlightToText(container, text, hlColor, id);
  sel.removeAllRanges();
}

// ================================================================
// AI SUMMARY
// ================================================================
async function generateSummary(fileId, rawText) {
  const summaryBtn = document.getElementById('summaryBtn');
  if (summaryBtn) { summaryBtn.classList.add('loading'); summaryBtn.textContent = '⏳ Resumiendo...'; }

  // Insert loading placeholder
  insertSummaryPanel(fileId, null, true);

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Eres un asistente experto en síntesis de textos para personas con TDAH. 
Analiza el siguiente texto en Markdown y genera un resumen estructurado en español que incluya:
1. Una frase de 1-2 líneas que capture la idea central (empiézala con "💡 Idea central:")
2. Entre 3 y 6 puntos clave en formato de lista (empiézalos con "🔑 Puntos clave:")
3. Una palabra o frase muy breve que sirva de "gancho mental" para recordar el texto (empiézala con "🧠 Para recordar:")

Sé conciso. Usa lenguaje claro y directo. No uses jerga técnica innecesaria.

TEXTO:
${rawText.slice(0, 6000)}`
        }]
      })
    });

    const data = await resp.json();
    const text = data?.content?.find(b => b.type === 'text')?.text || 'No se pudo generar el resumen.';
    summaries[fileId] = text;
    insertSummaryPanel(fileId, text, false);
  } catch(e) {
    summaries[fileId] = 'Error al conectar con la IA. Comprueba tu conexión.';
    insertSummaryPanel(fileId, summaries[fileId], false);
  }

  if (summaryBtn) { summaryBtn.classList.remove('loading'); summaryBtn.textContent = '✦ Resumir con IA'; }
}

function insertSummaryPanel(fileId, text, loading) {
  const contentArea = document.querySelector('.content-area');
  if (!contentArea) return;

  let panel = document.getElementById('summaryPanel');
  if (!panel) {
    panel = document.createElement('div');
    panel.id = 'summaryPanel';
    panel.className = 'summary-panel';
    contentArea.insertBefore(panel, contentArea.firstChild);
  }

  if (loading) {
    panel.innerHTML = `
      <div class="summary-panel-title">Resumen IA</div>
      <div class="summary-loading"><div class="spinner"></div>Analizando el documento...</div>
    `;
  } else {
    // Convert plain text response to simple HTML
    const htmlContent = (text || '')
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n- /g, '</p><ul><li>')
      .replace(/\n/g, '<br>');

    panel.innerHTML = `
      <div class="summary-panel-title">
        <span>✦ Resumen IA</span>
        <button class="summary-close" id="summaryCloseBtn" title="Cerrar resumen">✕</button>
      </div>
      <div class="summary-content">${text.replace(/\n/g,'<br>')}</div>
    `;
    document.getElementById('summaryCloseBtn').addEventListener('click', () => {
      panel.remove();
      summaryVisible[fileId] = false;
    });
  }
  summaryVisible[fileId] = true;
}

// ================================================================
// RENDER
// ================================================================
function render() {
  const mainEl = document.getElementById('main');
  const emptyState = document.getElementById('emptyState');

  if (!activeId || files.length === 0) {
    mainEl.innerHTML = '';
    mainEl.appendChild(emptyState);
    emptyState.style.display = '';
    document.getElementById('notesPanel').style.display = 'none';
    updateSidebar();
    return;
  }

  const file = files.find(f => f.id === activeId);
  if (!file) return;

  document.getElementById('notesPanel').style.display = 'flex';
  const notesTA = document.getElementById('notesTextarea');
  notesTA.value = notes[activeId] || '';
  notesTA.oninput = () => { notes[activeId] = notesTA.value; };

  const words = wordCount(file.raw);
  const chars = file.raw.length;

  const toolbar = `
    <div class="toolbar">
      <div class="toolbar-left">
        <button class="toggle-sidebar btn" id="toggleSidebarBtn" title="Panel lateral" style="color:var(--ink);border-color:var(--rule);">☰</button>
        <span class="file-title-display">${file.name}</span>
      </div>
      <div class="toolbar-right">
        <!-- Font size -->
        <div class="font-size-control">
          <span class="font-size-label" style="font-size:0.6rem;">A</span>
          <input type="range" class="font-slider" id="fontSlider" min="12" max="28" step="1" value="${fontSize}">
          <span class="font-size-label" style="font-size:0.9rem;">A</span>
          <span class="font-size-value" id="fontSizeDisplay">${fontSize}px</span>
        </div>
        <!-- Highlight color picker -->
        <div class="hl-picker">
          <span class="hl-picker-label">🖍</span>
          ${HL_COLORS.map(c=>`<div class="hl-swatch${hlColor===c?' active':''}" data-color="${c}" style="background:var(--hl-${c})" title="Subrayar en ${c}"></div>`).join('')}
        </div>
        <!-- Summary -->
        <button class="btn-summary" id="summaryBtn">✦ Resumir con IA</button>
        <!-- View mode -->
        <div class="view-toggle">
          <button class="view-btn ${viewMode==='rendered'?'active':''}" data-view="rendered">Vista</button>
          <button class="view-btn ${viewMode==='raw'?'active':''}" data-view="raw">Raw</button>
          <button class="view-btn ${viewMode==='split'?'active':''}" data-view="split">Split</button>
        </div>
      </div>
    </div>
  `;

  const metaBar = `
    <div class="meta-bar">
      <span>${words} palabras</span>
      <span>${chars} caracteres</span>
      <span>≈ ${readTime(words)} lectura</span>
      <span style="color:var(--accent);">Selecciona texto para subrayar</span>
    </div>
  `;

  if (viewMode === 'rendered') {
    mainEl.innerHTML = toolbar + metaBar + `
      <div class="content-area">
        <div class="md-rendered">${parseMarkdown(file.raw)}</div>
      </div>
    `;
  } else if (viewMode === 'raw') {
    mainEl.innerHTML = toolbar + `
      <div class="content-area">
        <pre class="md-raw">${esc(file.raw)}</pre>
      </div>
    `;
  } else {
    mainEl.innerHTML = toolbar + `
      <div class="split-view">
        <div class="split-pane"><pre class="md-raw">${esc(file.raw)}</pre></div>
        <div class="split-pane"><div class="content-area"><div class="md-rendered">${parseMarkdown(file.raw)}</div></div></div>
      </div>
    `;
  }

  // --- Toolbar events ---
  document.getElementById('toggleSidebarBtn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('collapsed');
  });

  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => { viewMode = btn.dataset.view; render(); });
  });

  // Font size
  const slider = document.getElementById('fontSlider');
  const display = document.getElementById('fontSizeDisplay');
  if (slider) {
    slider.addEventListener('input', () => {
      fontSize = parseInt(slider.value);
      display.textContent = fontSize + 'px';
      applyFontSize();
    });
  }

  // Highlight swatches
  document.querySelectorAll('.hl-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      hlColor = sw.dataset.color;
      document.querySelectorAll('.hl-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
    });
  });

  // Text selection -> highlight
  if (viewMode === 'rendered') {
    document.querySelector('.md-rendered').addEventListener('mouseup', handleTextSelection);
  }

  // Summary button
  const summaryBtn = document.getElementById('summaryBtn');
  if (summaryBtn) {
    summaryBtn.addEventListener('click', () => {
      if (summaryBtn.classList.contains('loading')) return;
      generateSummary(activeId, file.raw);
    });
    // If summary already generated and visible, restore it
    if (summaryVisible[activeId] && summaries[activeId]) {
      insertSummaryPanel(activeId, summaries[activeId], false);
    }
  }

  // Apply font + highlights
  applyFontSize();
  if (viewMode === 'rendered') applyHighlightsToDOM();

  updateSidebar();
}

// ================================================================
// SIDEBAR
// ================================================================
function updateSidebar() {
  const list = document.getElementById('fileList');
  const footer = document.getElementById('sidebarFooter');

  list.innerHTML = files.map(f => `
    <div class="file-item ${f.id===activeId?'active':''}" data-id="${f.id}">
      <span class="file-icon">▸</span>
      <span class="file-name" title="${f.name}">${f.name}</span>
      <button class="file-remove" data-id="${f.id}" title="Eliminar">✕</button>
    </div>
  `).join('');

  footer.textContent = files.length ? `${files.length} archivo${files.length!==1?'s':''}` : 'Sin archivos';

  list.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.classList.contains('file-remove')) return;
      activeId = el.dataset.id;
      render();
    });
  });
  list.querySelectorAll('.file-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      files = files.filter(f => f.id !== id);
      if (activeId === id) activeId = files.length ? files[0].id : null;
      render();
    });
  });
}

function addFile(name, raw) {
  const id = Date.now() + Math.random();
  files.push({ name, raw, id });
  activeId = id;
  render();
}

// ================================================================
// FILE INPUT / DRAG DROP
// ================================================================
function handleFiles(fileList) {
  Array.from(fileList).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => addFile(file.name, e.target.result);
    reader.readAsText(file, 'UTF-8');
  });
}

document.getElementById('fileInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });
document.getElementById('openBtn').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('main').addEventListener('click', e => { if (e.target.id==='emptyOpenBtn') document.getElementById('fileInput').click(); });

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('click', () => document.getElementById('fileInput').click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

// ================================================================
// PASTE MODAL
// ================================================================
const pasteModal = document.getElementById('pasteModal');
document.getElementById('pasteBtn').addEventListener('click', () => { pasteModal.style.display='flex'; document.getElementById('pasteArea').focus(); });
document.getElementById('pasteCancelBtn').addEventListener('click', () => { pasteModal.style.display='none'; document.getElementById('pasteArea').value=''; });
document.getElementById('pasteConfirmBtn').addEventListener('click', () => {
  const text = document.getElementById('pasteArea').value.trim();
  if (text) { addFile('Sin título.md', text); pasteModal.style.display='none'; document.getElementById('pasteArea').value=''; }
});
pasteModal.addEventListener('click', e => { if(e.target===pasteModal){ pasteModal.style.display='none'; document.getElementById('pasteArea').value=''; } });

// ================================================================
// KEYBOARD
// ================================================================
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.key==='o') { e.preventDefault(); document.getElementById('fileInput').click(); }
  if (e.key==='Escape' && pasteModal.style.display==='flex') { pasteModal.style.display='none'; }
});

// ================================================================
// INIT
// ================================================================
render();
</script>
</body>
</html>
